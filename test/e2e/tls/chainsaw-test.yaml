apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tls
spec:
  steps:
    # tls smoke test case with pkcs12
    - try:
      - apply:
          file: secretclass-4096.yaml
      - apply:
          file: configmap.yaml
    - try:
      - apply:
          file: tls-2048.yaml
      - assert:
          file: tls-2048-assert.yaml
      - apply:
          file: tls-4096.yaml
      - assert:
          file: tls-4096-assert.yaml
    - try:
      - apply:
          file: tls-pkcs12.yaml
      - assert:
          file: tls-pkcs12-assert.yaml
    - try:
      - apply:
          file: tls-scope.yaml
      - assert:
          file: tls-scope-assert.yaml
      catch:
        - script:
            env:
              - name: NAMESPACE
                value: ($namespace)
            content: |
              kubectl -n "$NAMESPACE" get pod
              kubectl -n "$NAMESPACE" describe pod
    # tls will expires case
    - try:
      - apply:
          file: tls-will-expires.yaml
      - assert:
          resource:
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              name: tls-will-expires
            status:
              availableReplicas: 1
              readyReplicas: 1
      - script:
          env:
            - name: NAMESPACE
              value: ($namespace)
          content: |
            # Record the initial pod UID right after the StatefulSet becomes ready.
            INITIAL_UID=$(kubectl -n "$NAMESPACE" get pod tls-will-expires-0 \
              -o jsonpath='{.metadata.uid}')
            echo "Initial pod UID: $INITIAL_UID"

            # The CSI plugin annotates the pod with an expiry time equal to
            # now + (jitteredCertLife - restartBuffer).  With certLife=60s,
            # restartBuffer=10s and jitter 0-20% the commons-operator evicts the
            # pod after 38-50 s.  Poll for up to 90 s to give comfortable margin.
            TIMEOUT=90
            ELAPSED=0
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              sleep 5
              ELAPSED=$((ELAPSED + 5))
              CURRENT_UID=$(kubectl -n "$NAMESPACE" get pod tls-will-expires-0 \
                -o jsonpath='{.metadata.uid}' 2>/dev/null || echo "")
              if [ -n "$CURRENT_UID" ] && [ "$CURRENT_UID" != "$INITIAL_UID" ]; then
                echo "Pod tls-will-expires-0 was restarted after ${ELAPSED}s" \
                     "(new UID: $CURRENT_UID)"
                exit 0
              fi
            done
            echo "Pod tls-will-expires-0 was NOT restarted within ${TIMEOUT}s"
            exit 1
          check:
            ($error == null): true
      catch:
        - script:
            env:
              - name: NAMESPACE
                value: ($namespace)
            content: |
              echo "=== Pod state ==="
              kubectl -n "$NAMESPACE" get pod tls-will-expires-0 -o yaml \
                2>/dev/null || echo "Pod not found"
              echo "=== Recent events ==="
              kubectl -n "$NAMESPACE" get events \
                --sort-by='.lastTimestamp' 2>/dev/null | tail -30
